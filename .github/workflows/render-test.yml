name: Cinematic Engine CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate imports
        run: |
          python -c "import auto_editor; import video_renderer; import motion_engine; print('CI OK')"
