name: Cinematic Engine CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy numpy imageio imageio-ffmpeg pillow

      - name: Verify project structure (engine package)
        run: |
          python -c "import engine; print('engine package OK')"
          python -c "import engine.auto_editor; print('AutoEditor module OK')"

      - name: Lightweight validation (core imports)
        run: |
          python -c "from engine.auto_editor import AutoEditor; print('AutoEditor import OK')"
          python -c "import moviepy; print('MoviePy OK')"

      - name: CI safety check
        run: |
          python -c "print('Cinematic Engine CI PASSED')"
