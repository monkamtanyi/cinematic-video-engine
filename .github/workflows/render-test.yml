name: Cinematic Engine CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install system dependencies (FFMPEG)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install moviepy numpy imageio imageio-ffmpeg

      - name: Validate imports
        run: |
          python -c "import moviepy; import auto_editor; import video_renderer; import motion_engine; print('CI OK')"
